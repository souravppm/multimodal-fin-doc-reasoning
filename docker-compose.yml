

services:
  financial-rag:
    build: .
    container_name: multimodal-fin-rag
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./qdrant_storage:/app/qdrant_storage
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"
